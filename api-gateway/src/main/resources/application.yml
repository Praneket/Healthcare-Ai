server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: diagnosis-service
          uri: ${DIAGNOSIS_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/diagnosis/**
          filters:
            - StripPrefix=1
            - name: JwtAuthFilter

        - id: patient-service
          uri: ${PATIENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - name: JwtAuthFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info
