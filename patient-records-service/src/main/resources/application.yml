server:
  port: ${PORT:8083}

spring:
  application:
    name: patient-records-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/patient_records}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    consumer:
      group-id: patient-records-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.healthcare.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.healthcare.patient.model.DiagnosisEvent

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
