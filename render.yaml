services:
  - type: web
    name: healthcare-ai-service
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    envVars:
      - key: MODELS_DIR
        value: ./models
    healthCheckPath: /health

  - type: web
    name: healthcare-auth-service
    runtime: docker
    dockerfilePath: ./auth-service/Dockerfile
    dockerContext: ./auth-service
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /actuator/health

  - type: web
    name: healthcare-patient-records
    runtime: docker
    dockerfilePath: ./patient-records-service/Dockerfile
    dockerContext: ./patient-records-service
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
    healthCheckPath: /actuator/health

  - type: web
    name: healthcare-notification
    runtime: docker
    dockerfilePath: ./notification-service/Dockerfile
    dockerContext: ./notification-service
    healthCheckPath: /actuator/health

  - type: web
    name: healthcare-diagnosis
    runtime: docker
    dockerfilePath: ./diagnosis-service/Dockerfile
    dockerContext: ./diagnosis-service
    envVars:
      - key: SPRING_REDIS_HOST
        sync: false
      - key: SPRING_REDIS_PORT
        value: "6379"
      - key: SPRING_REDIS_PASSWORD
        sync: false
      - key: SPRING_REDIS_SSL
        value: "true"
      - key: AI_SERVICE_URL
        sync: false
      - key: PATIENT_SERVICE_URL
        sync: false
    healthCheckPath: /actuator/health

  - type: web
    name: healthcare-api-gateway
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    envVars:
      - key: AUTH_SERVICE_URL
        sync: false
      - key: DIAGNOSIS_SERVICE_URL
        sync: false
      - key: PATIENT_SERVICE_URL
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /actuator/health
