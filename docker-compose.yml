version: '3.8'

services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare123
      POSTGRES_DB: healthcare_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare"]
      interval: 10s
      retries: 5

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ─── Microservices ────────────────────────────────────────────
  ai-service:
    build: ./ai-service
    ports:
      - "8085:8085"
    volumes:
      - ../Models:/app/models

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthcare_db
      SPRING_DATASOURCE_USERNAME: healthcare
      SPRING_DATASOURCE_PASSWORD: healthcare123
      JWT_SECRET: your-256-bit-secret-key-change-in-production

  patient-records-service:
    build: ./patient-records-service
    ports:
      - "8083:8083"
    depends_on:
      - mongodb
      - kafka
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/patient_records
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  diagnosis-service:
    build: ./diagnosis-service
    ports:
      - "8082:8082"
    depends_on:
      - redis
      - kafka
      - ai-service
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AI_SERVICE_URL: http://ai-service:8085

  notification-service:
    build: ./notification-service
    ports:
      - "8084:8084"
    depends_on:
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - diagnosis-service
      - patient-records-service
      - notification-service
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      DIAGNOSIS_SERVICE_URL: http://diagnosis-service:8082
      PATIENT_SERVICE_URL: http://patient-records-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
      - notification-service

volumes:
  postgres_data:
  mongo_data:
